<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>见室引号 | 小信号</title>
  <meta name="description" content="一些金句一些思考 一些优质信息源">
  <link rel="stylesheet" href="./assets/css/style.css">
  <style>
    .stats {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 24px;
      margin: 24px 0;
      padding: 16px;
      background: var(--bg-card);
      border-radius: var(--radius);
      border: 1px solid var(--border);
    }
    .stat-item { text-align: center; }
    .stat-value { font-size: 24px; font-weight: 700; color: var(--text-primary); }
    .stat-label { font-size: 12px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 4px; }
    .search-box { position: relative; margin-bottom: 24px; }
    .search-box input { width: 100%; padding: 12px 44px 12px 16px; background: var(--bg-card); border: 1px solid var(--border); border-radius: 100px; color: var(--text-primary); font-size: 14px; outline: none; transition: all 0.2s; }
    .search-box input:focus { border-color: var(--accent); background: var(--bg-card-hover); }
    .posts { display: flex; flex-direction: column; gap: 16px; }
    .post { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; transition: all 0.2s ease; animation: fadeIn 0.4s ease-out; }
    .post:hover { background: var(--bg-card-hover); transform: translateY(-2px); box-shadow: 0 8px 32px var(--shadow); }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .post-content { font-size: 15px; line-height: 1.75; color: var(--text-primary); white-space: pre-wrap; word-wrap: break-word; }
    .post-date { font-size: 12px; color: var(--text-muted); margin-top: 12px; }
    .random-btn { display: inline-flex; align-items: center; gap: 8px; margin-top: 24px; padding: 12px 24px; background: var(--bg-card); border: 1px solid var(--border); border-radius: 100px; color: var(--text-primary); font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.2s ease; }
    .random-btn:hover { background: var(--bg-card-hover); transform: translateY(-2px); }
    .error { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 40px 20px; text-align: center; }
    .error-icon { font-size: 48px; margin-bottom: 16px; }
    .empty { text-align: center; padding: 60px 20px; }
    .empty-icon { font-size: 48px; margin-bottom: 16px; }
    
    /* 同步状态栏 */
    .sync-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-top: 16px;
      font-size: 12px;
      color: var(--text-muted);
    }
    .sync-status {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .sync-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #22c55e;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    .btn-refresh {
      padding: 4px 12px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 100px;
      color: var(--text-secondary);
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-refresh:hover {
      border-color: var(--accent);
      color: var(--accent);
    }
    .btn-refresh.spinning svg {
      animation: spin 1s linear infinite;
    }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <header>
    <div class="header-inner">
      <a href="./" class="logo">小信号<span>.</span></a>
      <nav>
        <a href="./" class="active">见室引号</a>
        <a href="./writing.html">写作</a>
        <a href="./reading.html">阅览</a>
        <a href="./about.html">关于</a>
      </nav>
      <div class="controls">
        <a href="./search.html" class="btn-icon" title="搜索">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"></circle>
            <path d="m21 21-4.35-4.35"></path>
          </svg>
        </a>
        <button class="btn-icon" id="themeBtn" title="切换主题">
          <svg id="sunIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
          </svg>
          <svg id="moonIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none">
            <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>
          </svg>
        </button>
      </div>
    </div>
  </header>
  
  <main>
    <div class="page-header">
      <div class="hero-icon">💭</div>
      <h1>SEES-QUOTATION</h1>
      <p>一些金句一些思考 一些优质信息源</p>
      <button class="random-btn" id="randomBtn"><span>🎲</span><span>随机一条</span></button>
    </div>
    
    <div class="stats">
      <div class="stat-item"><div class="stat-value" id="postCount">-</div><div class="stat-label">动态</div></div>
      <div class="stat-item"><div class="stat-value" id="lastUpdate">-</div><div class="stat-label">更新</div></div>
    </div>
    
    <div class="search-box"><input type="text" id="searchInput" placeholder="搜索想法..." autocomplete="off"></div>
    
    <div id="content">
      <div class="loading">
        <div class="loading-spinner"></div>
        <p>加载中...</p>
      </div>
    </div>
    
    <!-- 同步状态栏 -->
    <div class="sync-bar">
      <span class="sync-status">
        <span class="sync-dot"></span>
        <span id="syncText">自动同步开启</span>
      </span>
      <button class="btn-refresh" id="refreshBtn" title="强制刷新">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M23 4v6h-6M1 20v-6h6M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
        </svg>
      </button>
    </div>
  </main>
  
  <footer>
    <p>由 Notion 驱动 · 每 10 分钟自动同步</p>
  </footer>
  
  <script src="./assets/js/main.js"></script>
  <script>
    let allPosts = [];
    let lastSyncTime = null;
    
    // 加载数据（带缓存破坏）
    async function loadPosts(force = false) {
      const content = document.getElementById('content');
      const refreshBtn = document.getElementById('refreshBtn');
      
      if (force) {
        refreshBtn.classList.add('spinning');
        content.innerHTML = '<div class="loading"><div class="loading-spinner"></div><p>刷新中...</p></div>';
      }
      
      try {
        // 添加时间戳防止缓存
        const timestamp = force ? Date.now() : '';
        const url = timestamp ? `./notion-data.json?t=${timestamp}` : './notion-data.json';
        
        const response = await fetch(url);
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        
        const data = await response.json();
        
        // 支持新格式（带 lastSync）和旧格式（纯数组）
        allPosts = data.posts || data;
        lastSyncTime = data.lastSync || null;
        
        // 更新统计
        document.getElementById('postCount').textContent = allPosts.length;
        
        if (allPosts.length > 0) {
          const lastDate = new Date(allPosts[0].date || allPosts[0].pubDate);
          document.getElementById('lastUpdate').textContent = 
            `${lastDate.getMonth()+1}/${lastDate.getDate()}`;
        }
        
        // 更新同步状态文本
        updateSyncStatus();
        
        renderPosts(allPosts);
        
      } catch (error) {
        console.error('加载失败:', error);
        content.innerHTML = `
          <div class="error">
            <div class="error-icon">⚠️</div>
            <h3>加载失败</h3>
            <p>${error.message}</p>
            <button onclick="loadPosts(true)" style="margin-top:10px;padding:8px 16px;background:var(--accent);color:white;border:none;border-radius:100px;cursor:pointer;">重试</button>
          </div>
        `;
      } finally {
        refreshBtn.classList.remove('spinning');
      }
    }
    
    function updateSyncStatus() {
      const syncText = document.getElementById('syncText');
      if (lastSyncTime) {
        const syncDate = new Date(lastSyncTime);
        const diff = Math.floor((Date.now() - syncDate) / 60000); // 分钟
        const timeStr = diff < 1 ? '刚刚' : diff < 60 ? `${diff}分钟前` : `${Math.floor(diff/60)}小时前`;
        syncText.textContent = `上次同步: ${timeStr}`;
      }
    }
    
    function renderPosts(posts) {
      const content = document.getElementById('content');
      if (posts.length === 0) {
        content.innerHTML = `<div class="empty"><div class="empty-icon">📭</div><p>暂无内容</p><p style="font-size:13px;color:var(--text-muted);margin-top:8px;">在 Notion 中添加数据后将自动同步</p></div>`;
        return;
      }
      
      content.innerHTML = `<div class="posts">${posts.map(post => {
        const text = post.content || post.title || '';
        const date = new Date(post.date || post.pubDate || Date.now());
        
        // 标签（如果有）
        const tagsHtml = (post.tags || []).length > 0 
          ? `<div style="margin-top:8px;display:flex;gap:6px;flex-wrap:wrap;">${post.tags.map(t => 
              `<span style="padding:2px 8px;background:var(--bg-primary);border-radius:100px;font-size:11px;color:var(--text-muted);">${escapeHtml(t)}</span>`
            ).join('')}</div>` 
          : '';
        
        return `<article class="post">
          <div class="post-content">${escapeHtml(text)}</div>
          ${tagsHtml}
          <div class="post-date">📅 ${date.toLocaleDateString('zh-CN')}</div>
        </article>`;
      }).join('')}</div>`;
    }
    
    function escapeHtml(text) {
      if (!text) return '';
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }
    
    // 搜索
    document.getElementById('searchInput').addEventListener('input', (e) => {
      const query = e.target.value.toLowerCase();
      if (!query) {
        renderPosts(allPosts);
        return;
      }
      const filtered = allPosts.filter(p => 
        (p.title || '').toLowerCase().includes(query) || 
        (p.content || '').toLowerCase().includes(query) ||
        (p.tags || []).some(t => t.toLowerCase().includes(query))
      );
      renderPosts(filtered);
    });
    
    // 随机
    document.getElementById('randomBtn').addEventListener('click', () => {
      if (allPosts.length === 0) return;
      const random = allPosts[Math.floor(Math.random() * allPosts.length)];
      renderPosts([random]);
    });
    
    // 手动刷新按钮
    document.getElementById('refreshBtn').addEventListener('click', () => {
      loadPosts(true);
    });
    
    // 初始化
    loadPosts();
    
    // 每 30 秒检查一次同步状态（不强制刷新数据）
    setInterval(updateSyncStatus, 30000);
  </script>
</body>
</html>
