---
layout: default
title: 见室引号
---

<div class="page-header">
  <div class="hero-icon">💭</div>
  <h1>SEES-QUOTATION</h1>
  <p>一些金句一些思考 一些优质信息源</p>
  <button class="random-btn" id="randomBtn">
    <span>🎲</span>
    <span>随机一条</span>
  </button>
</div>

<div class="stats">
  <div class="stat-item">
    <div class="stat-value" id="postCount">-</div>
    <div class="stat-label">动态</div>
  </div>
  <div class="stat-item">
    <div class="stat-value" id="updateTime">-</div>
    <div class="stat-label">更新</div>
  </div>
</div>

<div class="status" id="status">
  <span class="status-dot"></span>
  <span id="statusText">正在连接 Notion...</span>
</div>

<div class="search-box">
  <input type="text" id="searchInput" placeholder="搜索想法..." autocomplete="off">
  <button id="searchBtn">🔍</button>
</div>

<div class="posts" id="posts">
  <div class="loading">
    <div class="loading-spinner"></div>
    <p>正在从 Notion 加载...</p>
  </div>
</div>

<script>
// ============================================
// 见室引号 - Notion 同步配置
// ============================================

// ⚠️ 需要你自己配置的部分：
const NOTION_TOKEN = '{{ site.notion_token }}';  // 从 _config.yml 读取，或这里直接写死
const NOTION_DATABASE_ID = '{{ site.notion_database_id_ideas }}';  // 你的想法数据库ID

// 备用：如果上面为空，直接在这里填写（不推荐，会暴露token）
// const NOTION_TOKEN = 'secret_xxxxxxxx';
// const NOTION_DATABASE_ID = 'xxxxxxxx';

const REFRESH_INTERVAL = 5 * 60 * 1000; // 5分钟刷新

let posts = [];
let ls = null;
try { ls = window.localStorage; } catch (e) {}

// 格式化时间
function formatTime(d) {
  if (!d) return '-';
  const date = new Date(d);
  const now = new Date();
  const diff = now - date;
  const m = Math.floor(diff / 60000);
  const h = Math.floor(diff / 3600000);
  const da = Math.floor(diff / 86400000);
  
  if (m < 1) return '刚刚';
  if (m < 60) return m + '分钟前';
  if (h < 24) return h + '小时前';
  if (da < 7) return da + '天前';
  return date.toLocaleDateString('zh-CN', { month: 'short', day: 'numeric' });
}

function formatFullTime(d) {
  if (!d) return '-';
  return new Date(d).toLocaleString('zh-CN', { 
    month: '2-digit', 
    day: '2-digit', 
    hour: '2-digit', 
    minute: '2-digit' 
  });
}

function updateStatus(t, type = 'normal') {
  const s = document.getElementById('status');
  const st = document.getElementById('statusText');
  st.textContent = t;
  s.classList.remove('syncing', 'error');
  if (type === 'syncing') s.classList.add('syncing');
  if (type === 'error') s.classList.add('error');
}

// 从 Notion API 获取数据
async function fetchFromNotion() {
  // 如果没有配置，显示提示
  if (!NOTION_TOKEN || !NOTION_DATABASE_ID || NOTION_TOKEN.includes('{{')) {
    throw new Error('请配置 Notion Token 和 Database ID');
  }

  const response = await fetch(`https://api.notion.com/v1/databases/${NOTION_DATABASE_ID}/query`, {
    method: 'POST',
    headers: {
      'Authorization': `Bearer ${NOTION_TOKEN}`,
      'Notion-Version': '2022-06-28',
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({
      sorts: [{ timestamp: 'created_time', direction: 'descending' }],
      page_size: 100
    })
  });

  if (!response.ok) {
    throw new Error(`Notion API Error: ${response.status}`);
  }

  const data = await response.json();
  return data.results.map(page => {
    const props = page.properties;
    return {
      id: page.id,
      title: props.Name?.title?.[0]?.plain_text || '无标题',
      content: props.Content?.rich_text?.[0]?.plain_text || '',
      tags: props.Tags?.multi_select?.map(t => t.name) || [],
      created_time: page.created_time,
      url: page.url,
      cover: page.cover?.external?.url || page.cover?.file?.url || null
    };
  });
}

// 渲染单条想法
function renderPost(item, isModal = false) {
  const tags = item.tags || [];
  const content = item.content || item.title;
  
  // 链接可点击
  const linkedContent = content.replace(
    /(https?:\/\/[^\s<]+)/g,
    '<a href="$1" target="_blank" rel="noopener">$1</a>'
  );

  let html = `
    <div class="post-header">
      <div class="post-avatar">黑</div>
      <div class="post-meta">
        <div class="post-author">大黑天</div>
        <div class="post-time">${formatFullTime(item.created_time)} · ${formatTime(item.created_time)}</div>
      </div>
    </div>
    <div class="post-content">${linkedContent}</div>
  `;
  
  if (item.cover) {
    html += `
      <div class="post-images single">
        <img src="${item.cover}" loading="lazy" onclick="openLightbox('${item.cover}')" alt="">
      </div>
    `;
  }
  
  if (tags.length > 0) {
    html += `<div class="post-tags">${tags.map(t => `<span class="tag">#${t}</span>`).join('')}</div>`;
  }
  
  return html;
}

function renderPosts(items) {
  const c = document.getElementById('posts');
  if (!items || !items.length) {
    c.innerHTML = `<div class="empty"><div class="empty-icon">📝</div><p>暂无想法，去 Notion 添加吧</p></div>`;
    return;
  }
  
  c.innerHTML = items.map((item, i) => 
    `<article class="post" data-index="${i}">${renderPost(item)}</article>`
  ).join('');
  
  document.getElementById('postCount').textContent = items.length;
  document.getElementById('updateTime').textContent = formatTime(new Date());
}

// 搜索功能
function filterPosts(query) {
  if (!query) return posts;
  const lower = query.toLowerCase();
  return posts.filter(p => 
    (p.content || p.title).toLowerCase().includes(lower) ||
    p.tags?.some(t => t.toLowerCase().includes(lower))
  );
}

document.getElementById('searchInput').addEventListener('input', (e) => {
  const filtered = filterPosts(e.target.value);
  renderPosts(filtered);
});

// 获取数据
async function fetchPosts(showLoading = true) {
  const refreshBtn = document.getElementById('refreshBtn');
  if (refreshBtn) refreshBtn.disabled = true;
  if (showLoading) updateStatus('正在同步 Notion...', 'syncing');
  
  try {
    const items = await fetchFromNotion();
    posts = items;
    renderPosts(posts);
    updateStatus('已同步 Notion');
    if (ls) ls.setItem('notionIdeas', JSON.stringify({ posts, timestamp: Date.now() }));
  } catch (error) {
    console.error('获取失败:', error);
    
    // 尝试缓存
    if (ls) {
      const cached = ls.getItem('notionIdeas');
      if (cached) {
        try {
          const data = JSON.parse(cached);
          if (data.posts && data.posts.length) {
            posts = data.posts;
            renderPosts(posts);
            updateStatus('显示缓存数据');
            return;
          }
        } catch (e) {}
      }
    }
    
    updateStatus('同步失败: ' + error.message, 'error');
    document.getElementById('posts').innerHTML = `
      <div class="error">
        <div class="error-icon">⚠️</div>
        <h3>Notion 连接失败</h3>
        <p>${error.message}</p>
        <div style="text-align: left; margin-top: 16px; padding: 16px; background: var(--bg-card-hover); border-radius: 8px; font-size: 13px;">
          <p><strong>配置步骤：</strong></p>
          <ol style="margin-left: 16px; margin-top: 8px; line-height: 1.8;">
            <li>访问 <a href="https://www.notion.so/my-integrations" target="_blank">Notion Integrations</a> 创建集成</li>
            <li>复制 Token 填入 _config.yml 的 notion_token</li>
            <li>在 Notion 数据库页面点击 Share，邀请你的集成</li>
            <li>复制数据库 ID（URL 中 32 位字符）填入 notion_database_id_ideas</li>
          </ol>
        </div>
        <button class="retry-btn" onclick="window.fetchPosts(true)" style="margin-top: 16px;">重新加载</button>
      </div>`;
  } finally {
    if (refreshBtn) refreshBtn.disabled = false;
  }
}

// 随机功能
document.getElementById('randomBtn').addEventListener('click', () => {
  if (!posts.length) return;
  const randomPost = posts[Math.floor(Math.random() * posts.length)];
  document.getElementById('modalBody').innerHTML = renderPost(randomPost, true);
  document.getElementById('modal').classList.add('active');
});

// 初始化
function init() {
  const hasCache = (() => {
    if (!ls) return false;
    const cached = ls.getItem('notionIdeas');
    if (cached) {
      try {
        const data = JSON.parse(cached);
        if (data.posts && data.posts.length && Date.now() - data.timestamp < 3600000) {
          posts = data.posts;
          renderPosts(posts);
          updateStatus('显示缓存数据');
          return true;
        }
      } catch (e) {}
    }
    return false;
  })();
  
  fetchPosts(!hasCache);
  setInterval(() => fetchPosts(false), REFRESH_INTERVAL);
}

window.fetchPosts = fetchPosts;
init();
</script>
