<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>写作 | 小信号</title>
  <meta name="description" content="基于 GitHub Issues 的写作空间">
  <link rel="stylesheet" href="./assets/css/style.css">
  <style>
    /* 与见室引号统一的组件样式 */
    .stats {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 24px;
      margin: 24px 0;
      padding: 16px;
      background: var(--bg-card);
      border-radius: var(--radius);
      border: 1px solid var(--border);
    }
    .stat-item { text-align: center; }
    .stat-value { font-size: 24px; font-weight: 700; color: var(--text-primary); }
    .stat-label { font-size: 12px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 4px; }
    
    .filter-bar {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .filter-select {
      padding: 10px 20px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 100px;
      color: var(--text-primary);
      font-size: 14px;
      outline: none;
      cursor: pointer;
      transition: all 0.2s;
    }
    .filter-select:hover {
      border-color: var(--accent);
    }
    
    .new-issue-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 24px;
      padding: 12px 24px;
      background: var(--accent);
      color: white;
      text-decoration: none;
      border-radius: 100px;
      font-size: 14px;
      font-weight: 500;
      transition: opacity 0.2s;
    }
    .new-issue-btn:hover { opacity: 0.9; }
    
    .posts { display: flex; flex-direction: column; gap: 16px; }
    .post { 
      background: var(--bg-card); 
      border: 1px solid var(--border); 
      border-radius: var(--radius); 
      overflow: hidden;
      transition: all 0.2s ease; 
      animation: fadeIn 0.4s ease-out; 
    }
    .post:hover { 
      background: var(--bg-card-hover); 
      transform: translateY(-2px); 
      box-shadow: 0 8px 32px var(--shadow); 
    }
    @keyframes fadeIn { 
      from { opacity: 0; transform: translateY(10px); } 
      to { opacity: 1; transform: translateY(0); } 
    }
    
    .post-header {
      padding: 20px;
      cursor: pointer;
      display: flex;
      align-items: flex-start;
      gap: 12px;
    }
    .post-number {
      font-size: 13px;
      color: var(--text-muted);
      font-family: monospace;
      flex-shrink: 0;
    }
    .post-title-wrap {
      flex: 1;
    }
    .post-title {
      font-size: 17px;
      font-weight: 600;
      color: var(--text-primary);
      line-height: 1.4;
      margin-bottom: 8px;
    }
    .post-meta {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 13px;
      color: var(--text-secondary);
      flex-wrap: wrap;
    }
    .post-labels {
      display: flex;
      gap: 6px;
    }
    .post-label {
      padding: 2px 10px;
      border-radius: 100px;
      font-size: 11px;
      font-weight: 500;
    }
    
    .post-body {
      padding: 0 20px 20px;
      font-size: 15px;
      line-height: 1.8;
      color: var(--text-secondary);
      display: none;
      border-top: 1px solid var(--border);
      margin-top: 0;
      padding-top: 20px;
    }
    .post.expanded .post-body {
      display: block;
    }
    .post.expanded .post-header {
      background: var(--bg-card-hover);
    }
    .chevron {
      transition: transform 0.2s;
      color: var(--text-muted);
    }
    .post.expanded .chevron {
      transform: rotate(180deg);
    }
    
    .post-body img { max-width: 100%; border-radius: 8px; }
    .post-body pre {
      background: var(--bg-primary);
      padding: 16px;
      border-radius: 8px;
      overflow-x: auto;
      font-size: 13px;
    }
    .post-body code {
      font-family: 'SF Mono', Monaco, monospace;
      background: var(--bg-primary);
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 13px;
    }
    .post-body blockquote {
      border-left: 3px solid var(--accent);
      padding-left: 16px;
      margin: 16px 0;
      color: var(--text-secondary);
    }
    .post-footer {
      margin-top: 20px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
    }
    .post-footer a {
      color: var(--accent);
      text-decoration: none;
      font-size: 14px;
    }
    
    .error { 
      background: var(--bg-card); 
      border: 1px solid var(--border); 
      border-radius: var(--radius); 
      padding: 40px 20px; 
      text-align: center; 
    }
    .error-icon { font-size: 48px; margin-bottom: 16px; }
    .empty { text-align: center; padding: 60px 20px; }
    .empty-icon { font-size: 48px; margin-bottom: 16px; }
    
    .btn-retry {
      padding: 10px 24px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 100px;
      cursor: pointer;
      font-size: 14px;
      margin-right: 12px;
      font-weight: 500;
    }
    .error a {
      color: var(--accent);
      text-decoration: none;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <header>
    <div class="header-inner">
      <a href="./" class="logo">小信号<span>.</span></a>
      <nav>
        <a href="./">见室引号</a>
        <a href="./writing.html" class="active">写作</a>
        <a href="./reading.html">阅览</a>
        <a href="./about.html">关于</a>
      </nav>
      <div class="controls">
        <a href="./search.html" class="btn-icon" title="搜索">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"></circle>
            <path d="m21 21-4.35-4.35"></path>
          </svg>
        </a>
        <button class="btn-icon" id="themeBtn" title="切换主题">
          <svg id="sunIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="5"/>
            <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
          </svg>
          <svg id="moonIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none">
            <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>
          </svg>
        </button>
      </div>
    </div>
  </header>

  <main>
    <div class="page-header">
      <div class="hero-icon">✍️</div>
      <h1>WRITING</h1>
      <p>基于 GitHub Issues 的写作空间</p>
    </div>

    <div style="text-align: center;">
      <a href="https://github.com/daheitian/seesquotes/issues/new" target="_blank" class="new-issue-btn">
        <span>+</span>
        <span>新建文章</span>
      </a>
    </div>

    <div class="stats">
      <div class="stat-item">
        <div class="stat-value" id="issueCount">-</div>
        <div class="stat-label">文章</div>
      </div>
      <div class="stat-item">
        <div class="stat-value" id="lastUpdate">-</div>
        <div class="stat-label">更新</div>
      </div>
    </div>

    <div class="filter-bar">
      <select class="filter-select" id="labelFilter">
        <option value="">所有标签</option>
      </select>
      <select class="filter-select" id="sortSelect">
        <option value="newest">最新发布</option>
        <option value="oldest">最早发布</option>
        <option value="updated">最近更新</option>
      </select>
    </div>

    <div id="content">
      <div class="loading">
        <div class="loading-spinner"></div>
        <p>加载文章...</p>
      </div>
    </div>
  </main>

  <footer>
    <p>基于 GitHub Issues · 自动同步</p>
  </footer>

  <script src="./assets/js/main.js"></script>
  <script>
    // 配置
    const REPO = 'daheitian/seesquotes';
    const GITHUB_API = `https://api.github.com/repos/${REPO}/issues?state=all&per_page=100`;
    
    let allIssues = [];
    let currentLabel = '';
    let currentSort = 'newest';
    
    async function loadIssues() {
      const content = document.getElementById('content');
      content.innerHTML = `
        <div class="loading">
          <div class="loading-spinner"></div>
          <p>加载文章...</p>
        </div>
      `;
      
      try {
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 10000);
        
        const response = await fetch(GITHUB_API, {
          signal: controller.signal,
          headers: {
            'Accept': 'application/vnd.github.v3+json'
          }
        });
        
        clearTimeout(timeoutId);
        
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}: ${response.statusText}`);
        }
        
        allIssues = await response.json();
        allIssues = allIssues.filter(issue => !issue.pull_request);
        
        // 更新统计
        document.getElementById('issueCount').textContent = allIssues.length;
        if (allIssues.length > 0) {
          const lastDate = new Date(allIssues[0].created_at);
          document.getElementById('lastUpdate').textContent = 
            `${lastDate.getMonth()+1}/${lastDate.getDate()}`;
        }
        
        populateLabelFilter();
        renderIssues();
      } catch (error) {
        console.error('加载失败:', error);
        
        let errorMsg = error.message;
        if (error.name === 'AbortError') errorMsg = '请求超时';
        
        content.innerHTML = `
          <div class="error">
            <div class="error-icon">⚠️</div>
            <h3>加载失败</h3>
            <p>${errorMsg}</p>
            <button class="btn-retry" onclick="loadIssues()">重试</button>
            <a href="https://github.com/${REPO}/issues" target="_blank">直接访问 Issues →</a>
          </div>
        `;
      }
    }
    
    function populateLabelFilter() {
      const labels = new Set();
      allIssues.forEach(issue => {
        (issue.labels || []).forEach(label => labels.add(label.name));
      });
      
      const select = document.getElementById('labelFilter');
      while (select.options.length > 1) {
        select.remove(1);
      }
      
      Array.from(labels).sort().forEach(label => {
        const option = document.createElement('option');
        option.value = label;
        option.textContent = label;
        select.appendChild(option);
      });
    }
    
    function renderIssues() {
      const content = document.getElementById('content');
      
      let issues = allIssues;
      
      if (currentLabel) {
        issues = issues.filter(i => i.labels.some(l => l.name === currentLabel));
      }
      
      issues.sort((a, b) => {
        if (currentSort === 'newest') return new Date(b.created_at) - new Date(a.created_at);
        if (currentSort === 'oldest') return new Date(a.created_at) - new Date(b.created_at);
        if (currentSort === 'updated') return new Date(b.updated_at) - new Date(a.updated_at);
      });
      
      if (issues.length === 0) {
        content.innerHTML = `
          <div class="empty">
            <div class="empty-icon">📝</div>
            <p>暂无文章</p>
            <p style="font-size: 13px; margin-top: 8px; color: var(--text-muted);">
              点击上方按钮创建第一篇
            </p>
          </div>
        `;
        return;
      }
      
      content.innerHTML = `<div class="posts">${issues.map(issue => {
        const date = new Date(issue.created_at).toLocaleDateString('zh-CN');
        const labels = issue.labels || [];
        
        return `
          <article class="post" id="issue-${issue.number}">
            <div class="post-header" onclick="toggleIssue(${issue.number})">
              <span class="post-number">#${issue.number}</span>
              <div class="post-title-wrap">
                <div class="post-title">${escapeHtml(issue.title)}</div>
                <div class="post-meta">
                  <span>📅 ${date}</span>
                  <span>💬 ${issue.comments} 评论</span>
                  ${labels.length ? `
                    <div class="post-labels">
                      ${labels.map(l => `
                        <span class="post-label" style="background: #${l.color}20; color: #${l.color}">
                          ${escapeHtml(l.name)}
                        </span>
                      `).join('')}
                    </div>
                  ` : ''}
                </div>
              </div>
              <svg class="chevron" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="m6 9 6 6 6-6"/>
              </svg>
            </div>
            <div class="post-body" id="body-${issue.number}">
              ${issue.body ? marked.parse(issue.body) : '<p style="color: var(--text-muted);">无内容</p>'}
              <div class="post-footer">
                <a href="${issue.html_url}" target="_blank">在 GitHub 上查看 →</a>
              </div>
            </div>
          </article>
        `;
      }).join('')}</div>`;
    }
    
    function toggleIssue(number) {
      const item = document.getElementById(`issue-${number}`);
      item.classList.toggle('expanded');
    }
    
    function escapeHtml(text) {
      if (!text) return '';
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }
    
    document.getElementById('labelFilter').addEventListener('change', (e) => {
      currentLabel = e.target.value;
      renderIssues();
    });
    
    document.getElementById('sortSelect').addEventListener('change', (e) => {
      currentSort = e.target.value;
      renderIssues();
    });
    
    // 加载 marked.js
    const script = document.createElement('script');
    script.src = 'https://cdn.jsdelivr.net/npm/marked/marked.min.js';
    script.onload = loadIssues;
    script.onerror = () => {
      window.marked = { parse: (text) => text ? text.replace(/\n/g, '<br>') : '' };
      loadIssues();
    };
    document.head.appendChild(script);
  </script>  <!-- ✅ 正确闭合 -->
</body>
</html>
