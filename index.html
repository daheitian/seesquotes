<!DOCTYPE html>

<html lang="zh-CN" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>见室引号 | 小信号</title>

  <style>
    :root {
      --bg: #0f0f0f;
      --bg-card: #171717;
      --bg-card-hover: #1f1f1f;
      --text-primary: #eaeaea;
      --text-secondary: #888;
      --border: #2a2a2a;
      --radius: 16px;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
      background: var(--bg);
      color: var(--text-primary);
    }

    /* 顶部（弱存在感） */
    header {
      position: sticky;
      top: 0;
      backdrop-filter: blur(10px);
      background: rgba(15,15,15,0.6);
      padding: 12px 20px;
      z-index: 10;
    }

    .header-inner {
      display: flex;
      justify-content: space-between;
      align-items: center;
      max-width: 900px;
      margin: 0 auto;
    }

    .logo {
      font-size: 14px;
      opacity: 0.8;
    }

    /* 页面头 */
    .page-header {
      text-align: center;
      margin: 40px 0 20px;
    }

    .page-header h1 {
      font-size: 18px;
      margin: 0;
    }

    .page-header p {
      font-size: 13px;
      color: var(--text-secondary);
      margin-top: 6px;
    }

    /* 搜索 */
    .search-box {
      max-width: 600px;
      margin: 0 auto 20px;
      padding: 0 12px;
    }

    .search-box input {
      width: 100%;
      padding: 10px 14px;
      border-radius: 100px;
      border: 1px solid var(--border);
      background: var(--bg-card);
      color: var(--text-primary);
      outline: none;
    }

    /* 核心：瀑布流 */
    .posts {
      column-count: 3;
      column-gap: 16px;
      max-width: 1000px;
      margin: 0 auto;
      padding: 0 12px 40px;
    }

    @media (max-width: 900px) {
      .posts { column-count: 2; }
    }

    @media (max-width: 600px) {
      .posts { column-count: 1; }
    }

    .post {
      display: inline-block;
      width: 100%;
      margin-bottom: 16px;
      break-inside: avoid;

      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;

      transition: all 0.25s ease;
    }

    .post:hover {
      transform: translateY(-3px);
      background: var(--bg-card-hover);
    }

    /* 随机大卡片 */
    .post.large {
      font-size: 17px;
      padding: 20px;
    }

    /* 内容 */
    .post-content {
      line-height: 1.8;
      letter-spacing: 0.2px;
      white-space: pre-wrap;
    }

    .post-date {
      font-size: 11px;
      color: var(--text-secondary);
      margin-top: 10px;
      opacity: 0.6;
    }

    /* 空状态 */
    .empty {
      text-align: center;
      padding: 60px;
      color: var(--text-secondary);
    }

  </style>

</head>

<body>

<header>
  <div class="header-inner">
    <div class="logo">小信号</div>
  </div>
</header>

<main>

  <div class="page-header">
    <h1>SEES QUOTATION</h1>
    <p>一些金句，一些思考</p>
  </div>

  <div class="search-box">
    <input type="text" id="searchInput" placeholder="搜索想法...">
  </div>

  <div id="content">
    <div class="empty">加载中...</div>
  </div>

</main>

<script>
let allPosts = [];

async function loadPosts() {
  const content = document.getElementById('content');

  try {
    const res = await fetch('./notion-data.json');
    const data = await res.json();

    allPosts = Array.isArray(data) ? data : (data.results || []);
    renderPosts(allPosts);

  } catch (e) {
    content.innerHTML = '<div class="empty">加载失败</div>';
  }
}

function renderPosts(posts) {
  const content = document.getElementById('content');

  if (!posts.length) {
    content.innerHTML = '<div class="empty">暂无内容</div>';
    return;
  }

  content.innerHTML = `
    <div class="posts">
      ${posts.map(post => {
        const text = post.title || '';
        const date = new Date(post.date || post.pubDate);

        return `
          <div class="post ${Math.random() > 0.7 ? 'large' : ''}">
            <div class="post-content">${escapeHtml(text)}</div>
            <div class="post-date">${date.toLocaleDateString()}</div>
          </div>
        `;
      }).join('')}
    </div>
  `;
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

/* 搜索 */
document.getElementById('searchInput').addEventListener('input', e => {
  const q = e.target.value.toLowerCase();
  renderPosts(
    allPosts.filter(p => (p.title || '').toLowerCase().includes(q))
  );
});

loadPosts();
</script>

</body>
</html>
