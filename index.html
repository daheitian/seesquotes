<!DOCTYPE html>

<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>见室引号</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Playfair+Display:ital,wght@0,400;1,400&display=swap" rel="stylesheet">

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Inter', -apple-system;
  background:#f5f5f0;
  color:#1a1a1a;
  line-height:1.7;
}

/* 容器 */
.container {
  max-width: 680px;
  margin: 0 auto;
  padding: 100px 24px 60px;
}

/* 顶部（极简） */
.header {
  position: fixed;
  top: 20px;
  left: 24px;
  font-size: 13px;
  color:#888;
}

/* Hero（灵魂） */
.hero {
  text-align:center;
  margin-bottom:60px;
}

.tagline {
  font-family: 'Playfair Display', serif;
  font-size: 26px;
  line-height:1.5;
}

.tagline p {
  margin-bottom:6px;
}

/* 搜索（弱存在） */
.search {
  margin: 40px 0;
}

.search input {
  width:100%;
  border:none;
  border-bottom:1px solid #ddd;
  background:transparent;
  padding:8px 0;
  font-size:14px;
  outline:none;
}

/* 分割线 */
.divider {
  border:none;
  border-top:1px dashed #ddd;
  margin:40px 0;
}

/* 内容流（重点） */
.posts {
  display:flex;
  flex-direction:column;
  gap:28px;
}

/* 每条内容 */
.post {
  font-size:16px;
  line-height:1.8;
}

/* 金句风格 */
.post strong {
  font-family:'Playfair Display', serif;
  font-style: italic;
  font-size:20px;
}

/* 时间（弱化） */
.post-date {
  font-size:12px;
  color:#999;
  margin-top:6px;
}

/* 空状态 */
.empty {
  text-align:center;
  color:#999;
  padding:60px 0;
}

/* 响应式 */
@media (max-width:640px){
  .container { padding:80px 20px; }
  .tagline { font-size:22px; }
}
</style>

</head>

<body>

<div class="header">小信号</div>

<div class="container">

  <!-- Hero -->

  <section class="hero">
    <div class="tagline">
      <p>一些句子，</p>
      <p>一些还没想清楚的想法，</p>
      <p>以及那些微小但重要的信号。</p>
    </div>
  </section>

  <!-- 搜索 -->

  <div class="search">
    <input type="text" id="searchInput" placeholder="搜索一句话...">
  </div>

  <hr class="divider">

  <!-- 内容 -->

  <div id="content">
    <div class="empty">加载中...</div>
  </div>

</div>

<script>
let allPosts = [];

async function loadPosts(){
  const el = document.getElementById('content');

  try{
    const res = await fetch('./notion-data.json');
    const data = await res.json();

    allPosts = Array.isArray(data) ? data : (data.results || []);
    render(allPosts);

  }catch(e){
    el.innerHTML = '<div class="empty">加载失败</div>';
  }
}

function render(posts){
  const el = document.getElementById('content');

  if(!posts.length){
    el.innerHTML = '<div class="empty">暂无内容</div>';
    return;
  }

  el.innerHTML = `
    <div class="posts">
      ${posts.map(p=>{
        const text = p.title || '';
        const date = new Date(p.date || p.pubDate);

        return `
          <div class="post">
            <div class="post-content">${format(text)}</div>
            <div class="post-date">${date.toLocaleDateString()}</div>
          </div>
        `;
      }).join('')}
    </div>
  `;
}

/* 核心：让句子更像“引用” */
function format(text){
  if(text.length < 60){
    return `<strong>"${escape(text)}"</strong>`;
  }
  return escape(text);
}

function escape(str){
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

/* 搜索 */
document.getElementById('searchInput').addEventListener('input', e=>{
  const q = e.target.value.toLowerCase();
  render(allPosts.filter(p => (p.title||'').toLowerCase().includes(q)));
});

loadPosts();
</script>

</body>
</html>
