---
layout: default
title: 见室引号
---

<div class="page-header">
  <div class="hero-icon">💭</div>
  <h1>SEES-QUOTATION</h1>
  <p>一些金句一些思考 一些优质信息源</p>
  <button class="random-btn" id="randomBtn">
    <span>🎲</span>
    <span>随机一条</span>
  </button>
</div>

<div class="stats">
  <div class="stat-item">
    <div class="stat-value" id="postCount">-</div>
    <div class="stat-label">动态</div>
  </div>
  <div class="stat-item">
    <div class="stat-value" id="updateTime">-</div>
    <div class="stat-label">更新</div>
  </div>
</div>

<div class="status" id="status">
  <span class="status-dot"></span>
  <span id="statusText">加载中...</span>
</div>

<div class="search-box">
  <input type="text" id="searchInput" placeholder="搜索想法..." autocomplete="off">
  <button id="searchBtn">🔍</button>
</div>

<div class="posts" id="posts">
  <div class="loading">
    <div class="loading-spinner"></div>
    <p>正在加载...</p>
  </div>
</div>

<script>
// ============================================
// 见室引号 - 读取本地 JSON 数据
// ============================================

let posts = [];
let ls = null;
try { ls = window.localStorage; } catch (e) {}

function formatTime(d) {
  if (!d) return '-';
  const date = new Date(d);
  const now = new Date();
  const diff = now - date;
  const m = Math.floor(diff / 60000);
  const h = Math.floor(diff / 3600000);
  const da = Math.floor(diff / 86400000);
  
  if (m < 1) return '刚刚';
  if (m < 60) return m + '分钟前';
  if (h < 24) return h + '小时前';
  if (da < 7) return da + '天前';
  return date.toLocaleDateString('zh-CN', { month: 'short', day: 'numeric' });
}

function formatFullTime(d) {
  if (!d) return '-';
  return new Date(d).toLocaleString('zh-CN', { 
    month: '2-digit', 
    day: '2-digit', 
    hour: '2-digit', 
    minute: '2-digit' 
  });
}

function updateStatus(t, type = 'normal') {
  const s = document.getElementById('status');
  const st = document.getElementById('statusText');
  st.textContent = t;
  s.classList.remove('syncing', 'error');
  if (type === 'syncing') s.classList.add('syncing');
  if (type === 'error') s.classList.add('error');
}

// 解析 Notion API 返回的数据
function parseNotionData(data) {
  if (!data || !data.results) return [];
  
  return data.results.map(page => {
    const props = page.properties;
    
    // 获取标题（可能是 Name 或 title）
    const title = props.Name?.title?.[0]?.plain_text || 
                  props.title?.title?.[0]?.plain_text || 
                  '无标题';
    
    // 获取内容（可能是 Content 或正文）
    const content = props.Content?.rich_text?.[0]?.plain_text || 
                    props.内容?.rich_text?.[0]?.plain_text ||
                    props.Note?.rich_text?.[0]?.plain_text ||
                    title;  // 如果没有内容字段，用标题
    
    // 获取标签
    const tags = props.Tags?.multi_select?.map(t => t.name) || 
                 props.tags?.multi_select?.map(t => t.name) ||
                 props.标签?.multi_select?.map(t => t.name) || [];
    
    // 获取封面图
    const cover = page.cover?.external?.url || 
                  page.cover?.file?.url || 
                  null;
    
    return {
      id: page.id,
      title: title,
      content: content,
      tags: tags,
      created_time: page.created_time,
      last_edited_time: page.last_edited_time,
      url: page.url,
      cover: cover
    };
  });
}

// 渲染单条想法
function renderPost(item, isModal = false) {
  const tags = item.tags || [];
  const content = item.content || item.title;
  
  // 链接可点击
  const linkedContent = content.replace(
    /(https?:\/\/[^\s<]+)/g,
    '<a href="$1" target="_blank" rel="noopener">$1</a>'
  );

  let html = `
    <div class="post-header">
      <div class="post-avatar">黑</div>
      <div class="post-meta">
        <div class="post-author">大黑天</div>
        <div class="post-time">${formatFullTime(item.created_time)} · ${formatTime(item.created_time)}</div>
      </div>
    </div>
    <div class="post-content">${linkedContent}</div>
  `;
  
  if (item.cover) {
    html += `
      <div class="post-images single">
        <img src="${item.cover}" loading="lazy" onclick="openLightbox('${item.cover}')" alt="">
      </div>
    `;
  }
  
  if (tags.length > 0) {
    html += `<div class="post-tags">${tags.map(t => `<span class="tag">#${t}</span>`).join('')}</div>`;
  }
  
  return html;
}

function renderPosts(items) {
  const c = document.getElementById('posts');
  if (!items || !items.length) {
    c.innerHTML = `
      <div class="empty">
        <div class="empty-icon">📝</div>
        <p>暂无想法</p>
        <p style="font-size: 13px; margin-top: 8px; color: var(--text-muted);">
          在 Notion 中添加内容，GitHub Actions 会自动同步
        </p>
      </div>`;
    return;
  }
  
  c.innerHTML = items.map((item, i) => 
    `<article class="post" data-index="${i}">${renderPost(item)}</article>`
  ).join('');
  
  document.getElementById('postCount').textContent = items.length;
  document.getElementById('updateTime').textContent = formatTime(new Date());
}

// 搜索功能
function filterPosts(query) {
  if (!query) return posts;
  const lower = query.toLowerCase();
  return posts.filter(p => 
    (p.content || '').toLowerCase().includes(lower) ||
    (p.title || '').toLowerCase().includes(lower) ||
    p.tags?.some(t => t.toLowerCase().includes(lower))
  );
}

document.getElementById('searchInput').addEventListener('input', (e) => {
  const filtered = filterPosts(e.target.value);
  renderPosts(filtered);
});

// 加载数据（优先本地缓存，然后 fetch JSON）
async function loadData() {
  updateStatus('加载中...', 'syncing');
  
  try {
    // 尝试从本地 JSON 文件加载
    const response = await fetch('{{ site.baseurl }}/_data/notion_ideas.json?t=' + Date.now());
    
    if (!response.ok) {
      throw new Error('数据文件不存在，等待首次同步');
    }
    
    const data = await response.json();
    posts = parseNotionData(data);
    
    // 缓存到 localStorage
    if (ls) {
      ls.setItem('notionIdeas', JSON.stringify({ 
        posts, 
        timestamp: Date.now(),
        source: 'json'
      }));
    }
    
    renderPosts(posts);
    updateStatus('已同步');
    
  } catch (error) {
    console.error('加载失败:', error);
    
    // 尝试从 localStorage 读取缓存
    if (ls) {
      const cached = ls.getItem('notionIdeas');
      if (cached) {
        try {
          const data = JSON.parse(cached);
          if (data.posts && data.posts.length) {
            posts = data.posts;
            renderPosts(posts);
            updateStatus('显示缓存数据');
            return;
          }
        } catch (e) {}
      }
    }
    
    updateStatus('等待首次同步', 'error');
    document.getElementById('posts').innerHTML = `
      <div class="error">
        <div class="error-icon">⏳</div>
        <h3>等待数据同步</h3>
        <p>GitHub Actions 正在首次同步 Notion 数据...</p>
        <p style="font-size: 13px; margin-top: 8px; color: var(--text-muted);">
          1. 确保已在仓库 Secrets 中配置 NOTION_TOKEN 和数据库 ID<br>
          2. 手动运行一次 GitHub Actions workflow<br>
          3. 刷新页面
        </p>
      </div>`;
  }
}

// 随机功能
document.getElementById('randomBtn').addEventListener('click', () => {
  if (!posts.length) return;
  const randomPost = posts[Math.floor(Math.random() * posts.length)];
  document.getElementById('modalBody').innerHTML = renderPost(randomPost, true);
  document.getElementById('modal').classList.add('active');
});

// 刷新按钮（重新加载 JSON）
document.getElementById('refreshBtn').addEventListener('click', () => {
  loadData();
});

// 初始化
loadData();
</script>
