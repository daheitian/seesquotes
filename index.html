<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sees Quotes</title>
    <link rel="stylesheet" href="./assets/css/style.css">
</head>
<body>
    <div id="quotes"></div>
    <script>
        // Fetching the updated JSON data
        fetch('./notion-data.json')
            .then(response => response.json())
            .then(data => {
                const quotesContainer = document.getElementById('quotes');
                data.forEach(quote => {
                    const quoteElement = document.createElement('div');
                    quoteElement.className = 'quote';
                    quoteElement.innerHTML = `<h2>${quote.title}</h2><p>${quote.content}</p><p>${quote.tags.join(', ')}</p>`;
                    quotesContainer.appendChild(quoteElement);
                });
            })
            .catch(error => console.error('Error loading the quotes:', error));
    </script>
</body>
</html>
