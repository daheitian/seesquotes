<!DOCTYPE html>

<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>见室引号</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Playfair+Display:ital,wght@0,400;1,400&display=swap" rel="stylesheet">

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Inter', -apple-system;
  background:#f5f5f0;
  color:#1a1a1a;
  line-height:1.7;
}

/* ✅ 保留你的导航结构 */
header {
  position: sticky;
  top: 0;
  background: rgba(245,245,240,0.8);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid #eee;
}

.header-inner {
  max-width: 900px;
  margin: 0 auto;
  padding: 12px 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.logo {
  font-size: 14px;
  color:#666;
  text-decoration:none;
}

nav a {
  margin-left:16px;
  font-size:13px;
  color:#888;
  text-decoration:none;
}

nav a:hover {
  color:#000;
}

/* 主体 */
.container {
  max-width: 680px;
  margin: 0 auto;
  padding: 100px 24px 60px;
}

/* Hero */
.hero {
  text-align:center;
  margin-bottom:50px;
}

.tagline {
  font-family: 'Playfair Display', serif;
  font-size: 26px;
  line-height:1.5;
}

.tagline p { margin-bottom:6px; }

/* 搜索 */
.search {
  margin: 40px 0;
}

.search input {
  width:100%;
  border:none;
  border-bottom:1px solid #ddd;
  background:transparent;
  padding:8px 0;
  font-size:14px;
  outline:none;
}

/* 分割线 */
.divider {
  border:none;
  border-top:1px dashed #ddd;
  margin:40px 0;
}

/* 内容（关键：不是卡片） */
.posts {
  display:flex;
  flex-direction:column;
  gap:28px;
}

.post {
  font-size:16px;
  line-height:1.8;
}

/* 金句强调 */
.post strong {
  font-family:'Playfair Display', serif;
  font-style: italic;
  font-size:20px;
}

/* 时间 */
.post-date {
  font-size:12px;
  color:#999;
  margin-top:6px;
}

/* 空 */
.empty {
  text-align:center;
  color:#999;
  padding:60px 0;
}

</style>

</head>

<body>

<header>
  <div class="header-inner">
    <a href="./" class="logo">小信号</a>
    <nav>
      <a href="./">见室引号</a>
      <a href="./writing.html">写作</a>
      <a href="./reading.html">阅览</a>
      <a href="./about.html">关于</a>
    </nav>
  </div>
</header>

<div class="container">

  <section class="hero">
    <div class="tagline">
      <p>一些句子，</p>
      <p>一些还没想清楚的想法，</p>
      <p>以及那些微小但重要的信号。</p>
    </div>
  </section>

  <div class="search">
    <input type="text" id="searchInput" placeholder="搜索一句话...">
  </div>

  <hr class="divider">

  <div id="content">
    <div class="empty">加载中...</div>
  </div>

</div>

<script>
let allPosts = [];

async function loadPosts(){
  const el = document.getElementById('content');

  try{
    const res = await fetch('./notion-data.json');
    const data = await res.json();

    allPosts = Array.isArray(data) ? data : (data.results || []);
    render(allPosts);

  }catch(e){
    el.innerHTML = '<div class="empty">加载失败</div>';
  }
}

function render(posts){
  const el = document.getElementById('content');

  if(!posts.length){
    el.innerHTML = '<div class="empty">暂无内容</div>';
    return;
  }

  el.innerHTML = `
    <div class="posts">
      ${posts.map(p=>{
        const text = p.title || '';
        const date = new Date(p.date || p.pubDate);

        return `
          <div class="post">
            <div>${format(text)}</div>
            <div class="post-date">${date.toLocaleDateString()}</div>
          </div>
        `;
      }).join('')}
    </div>
  `;
}

function format(text){
  if(text.length < 60){
    return `<strong>"${escape(text)}"</strong>`;
  }
  return escape(text);
}

function escape(str){
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

document.getElementById('searchInput').addEventListener('input', e=>{
  const q = e.target.value.toLowerCase();
  render(allPosts.filter(p => (p.title||'').toLowerCase().includes(q)));
});

loadPosts();
</script>

</body>
</html>
