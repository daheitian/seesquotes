name: Sync Notion and Deploy

on:
  schedule:
    - cron: '0 */3 * * *'  # 每3小时同步
  workflow_dispatch:  # 手动触发
  push:
    branches: [ main, master ]

# 权限设置
permissions:
  contents: read
  pages: write
  id-token: write

# 并发控制
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # 任务1：同步 Notion 数据
  sync:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.commit.outputs.changed }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Setup Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq
      
      - name: Fetch Notion Ideas
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DB_IDEAS: ${{ secrets.NOTION_DB_IDEAS }}
        run: |
          mkdir -p _data
          
          if [ -z "$NOTION_TOKEN" ] || [ -z "$NOTION_DB_IDEAS" ]; then
            echo "⚠️ Secrets not set, creating empty files"
            echo '{"results":[]}' > _data/notion_ideas.json
          else
            echo "📝 Fetching ideas..."
            curl -s -X POST \
              -H "Authorization: Bearer $NOTION_TOKEN" \
              -H "Notion-Version: 2022-06-28" \
              -H "Content-Type: application/json" \
              "https://api.notion.com/v1/databases/$NOTION_DB_IDEAS/query" \
              -d '{"sorts":[{"timestamp":"created_time","direction":"descending"}],"page_size":100}' \
              | jq '.' > _data/notion_ideas.json
            
            COUNT=$(jq '.results | length' _data/notion_ideas.json)
            echo "✅ Fetched $COUNT ideas"
          fi
      
      - name: Fetch Notion Reading
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DB_READING: ${{ secrets.NOTION_DB_READING }}
        run: |
          if [ -z "$NOTION_TOKEN" ] || [ -z "$NOTION_DB_READING" ]; then
            echo '{"results":[]}' > _data/notion_reading.json
          else
            echo "📚 Fetching reading list..."
            curl -s -X POST \
              -H "Authorization: Bearer $NOTION_TOKEN" \
              -H "Notion-Version: 2022-06-28" \
              -H "Content-Type: application/json" \
              "https://api.notion.com/v1/databases/$NOTION_DB_READING/query" \
              -d '{"sorts":[{"timestamp":"created_time","direction":"descending"}],"page_size":100}' \
              | jq '.' > _data/notion_reading.json
            
            COUNT=$(jq '.results | length' _data/notion_reading.json)
            echo "✅ Fetched $COUNT reading items"
          fi
      
      - name: Commit changes
        id: commit
        run: |
          git add _data/
          if git diff --cached --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "ℹ️ No changes"
          else
            git commit -m "🔄 Sync Notion data [$(date +'%Y-%m-%d %H:%M UTC')]"
            git push
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "✅ Committed changes"
          fi

  # 任务2：部署到 GitHub Pages（纯静态，无 Jekyll）
  deploy:
    needs: sync
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Pages
        uses: actions/configure-pages@v4
      
      - name: Prepare site
        run: |
          # 创建部署目录
          mkdir -p _site
          
          # 复制所有静态文件（排除不需要的）
          cp -r index.html writing.html reading.html about.html _site/ 2>/dev/null || true
          cp -r assets _site/ 2>/dev/null || true
          cp -r _layouts _site/ 2>/dev/null || true
          cp -r _data _site/ 2>/dev/null || true
          
          # 如果有其他文件也复制
          cp -r *.css _site/ 2>/dev/null || true
          cp -r *.js _site/ 2>/dev/null || true
          
          # 确保数据文件存在
          mkdir -p _site/_data
          if [ ! -f "_site/_data/notion_ideas.json" ]; then
            echo '{"results":[]}' > _site/_data/notion_ideas.json
          fi
          if [ ! -f "_site/_data/notion_reading.json" ]; then
            echo '{"results":[]}' > _site/_data/notion_reading.json
          fi
          
          echo "📁 Site prepared:"
          ls -la _site/
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'
      
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
