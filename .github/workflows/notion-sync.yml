name: Sync Notion to JSON

on:
  schedule:
    - cron: '*/15 * * * *'  # 每15分钟同步
  workflow_dispatch:  # 手动触发

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Fetch Notion Data
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          DATABASE_ID: ${{ secrets.DATABASE_ID }}
        run: |
          # 调用 Notion API
          curl -X POST \
            "https://api.notion.com/v1/databases/${DATABASE_ID}/query" \
            -H "Authorization: Bearer ${NOTION_TOKEN}" \
            -H "Notion-Version: 2022-06-28" \
            -H "Content-Type: application/json" \
            -d '{"page_size": 100, "sorts": [{"timestamp": "created_time", "direction": "descending"}]}' \
            -o notion-raw.json
          
          # 检查是否成功
          if grep -q "error" notion-raw.json; then
            echo "Notion API Error:"
            cat notion-raw.json
            exit 1
          fi
          
          # 转换为标准格式
          node -e '
            const fs = require("fs");
            const raw = JSON.parse(fs.readFileSync("notion-raw.json", "utf8"));
            
            const posts = (raw.results || []).map(page => {
              const p = page.properties || {};
              
              // 智能提取字段（支持中英文）
              const getTitle = () => {
                const t = p.Name || p.name || p.标题 || p.Title || p.title;
                return t?.title?.map(x => x.plain_text).join("") || "无标题";
              };
              
              const getContent = () => {
                const c = p.Content || p.content || p.内容 || p.Note || p.note || p.Body || p.body;
                return c?.rich_text?.map(x => x.plain_text).join("") || "";
              };
              
              const getTags = () => {
                const t = p.Tags || p.tags || p.标签 || p.Tag || p.tag;
                return t?.multi_select?.map(x => x.name) || [];
              };
              
              const getDate = () => {
                const d = p.Date || p.date || p.日期;
                return d?.date?.start || page.created_time;
              };
              
              return {
                title: getTitle(),
                content: getContent(),
                tags: getTags(),
                date: getDate(),
                pubDate: getDate(),
                author: "Notion",
                images: [],
                url: page.url
              };
            });
            
            fs.writeFileSync("notion-data.json", JSON.stringify(posts, null, 2));
            console.log("✓ 同步完成:", posts.length, "条记录");
          '
          
      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add notion-data.json
          git diff --staged --quiet || git commit -m "Sync Notion data [$(date)]"
          git push
