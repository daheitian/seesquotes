name: Sync Notion Data

on:
  schedule:
    - cron: '0 */6 * * *'  # 每6小时
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install axios

      - name: Fetch Notion data
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        run: |
          node -e "
          const axios = require('axios');
          const fs = require('fs');
          
          (async () => {
            try {
              // ✅ 修复：URL 没有空格
              const url = \`https://api.notion.com/v1/databases\${process.env.NOTION_DATABASE_ID}/query\`;
              console.log('请求 URL:', url.replace(process.env.NOTION_DATABASE_ID, '***'));
              
              const response = await axios.post(url, {}, {
                headers: {
                  'Authorization': \`Bearer \${process.env.NOTION_TOKEN}\`,
                  'Notion-Version': '2022-06-28'
                }
              });
              
              console.log('✅ API 响应:', response.data.results.length, '条记录');
              
              const data = response.data.results.map(page => ({
                title: page.properties.Name?.title?.[0]?.plain_text || '',
                content: page.properties.Content?.rich_text?.[0]?.plain_text || '',
                tags: page.properties.Tags?.multi_select?.map(t => t.name) || [],
                date: page.properties.Date?.date?.start || page.created_time,
                pubDate: page.created_time,
                author: page.properties.Author?.rich_text?.[0]?.plain_text || 'Notion',
                url: page.public_url || ''
              }));
              
              fs.writeFileSync('notion-data.json', JSON.stringify(data, null, 2));
              console.log('✅ 已保存', data.length, '条');
              
              // 打印前3条检查
              data.slice(0,3).forEach((d,i) => console.log(\`\${i+1}. \${d.title.substring(0,40)}\`));
              
            } catch (error) {
              console.error('❌ 错误:', error.message);
              if (error.response) {
                console.error('状态码:', error.response.status);
                console.error('详情:', error.response.data);
              }
              process.exit(1);
            }
          })();
          "

      - name: Commit and push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          if git diff --quiet notion-data.json; then
            echo "No changes"
          else
            git add notion-data.json
            git commit -m "sync: $(date '+%Y-%m-%d %H:%M:%S')"
            git push
          fi
