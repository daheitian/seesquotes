name: Sync Notion Data

on:
  schedule:
    - cron: '0 */6 * * *'  # 每6小时同步一次
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Fetch Notion Data
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DB_IDEAS: ${{ secrets.NOTION_DB_IDEAS }}
          NOTION_DB_READING: ${{ secrets.NOTION_DB_READING }}
        run: |
          # 用 curl 获取 Notion 数据并保存为 JSON
          curl -X POST \
            -H "Authorization: Bearer $NOTION_TOKEN" \
            -H "Notion-Version: 2022-06-28" \
            -H "Content-Type: application/json" \
            "https://api.notion.com/v1/databases/$NOTION_DB_IDEAS/query" \
            > _data/notion_ideas.json
          
          curl -X POST \
            -H "Authorization: Bearer $NOTION_TOKEN" \
            -H "Notion-Version: 2022-06-28" \
            -H "Content-Type: application/json" \
            "https://api.notion.com/v1/databases/$NOTION_DB_READING/query" \
            > _data/notion_reading.json
      
      - name: Commit and Push
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add _data/
          git diff --quiet && git diff --staged --quiet || git commit -m "Sync Notion data"
          git push
