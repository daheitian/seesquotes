name: Sync Notion Data

on:
  schedule:
    - cron: '0 */3 * * *'  # 每3小时同步一次
  workflow_dispatch:  # 允许手动触发
  push:
    branches: [ main, master ]  # 推送时也触发（首次配置时用）

jobs:
  sync:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Fetch Notion Data
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DB_IDEAS: ${{ secrets.NOTION_DB_IDEAS }}
          NOTION_DB_READING: ${{ secrets.NOTION_DB_READING }}
        run: |
          mkdir -p _data
          
          # 同步见室引号（想法）
          echo "Syncing Ideas..."
          curl -s -X POST \
            -H "Authorization: Bearer $NOTION_TOKEN" \
            -H "Notion-Version: 2022-06-28" \
            -H "Content-Type: application/json" \
            "https://api.notion.com/v1/databases/$NOTION_DB_IDEAS/query" \
            -d '{
              "sorts": [{"timestamp":"created_time","direction":"descending"}],
              "page_size": 100
            }' | jq '.' > _data/notion_ideas.json
          
          # 同步阅览（阅读清单）
          echo "Syncing Reading..."
          curl -s -X POST \
            -H "Authorization: Bearer $NOTION_TOKEN" \
            -H "Notion-Version: 2022-06-28" \
            -H "Content-Type: application/json" \
            "https://api.notion.com/v1/databases/$NOTION_DB_READING/query" \
            -d '{
              "sorts": [{"timestamp":"created_time","direction":"descending"}],
              "page_size": 100
            }' | jq '.' > _data/notion_reading.json
          
          # 验证文件
          echo "Ideas count: $(jq '.results | length' _data/notion_ideas.json)"
          echo "Reading count: $(jq '.results | length' _data/notion_reading.json)"
      
      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add _data/
          git diff --quiet && git diff --staged --quiet || (git commit -m "🔄 Auto-sync Notion data [$(date +'%Y-%m-%d %H:%M')]" && git push)
