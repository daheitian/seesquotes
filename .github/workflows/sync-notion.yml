name: Sync Notion Data

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install axios

      - name: Fetch Notion data
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        run: |
          node -e "
          const axios = require('axios');
          const fs = require('fs');
          
          (async () => {
            try {
              const response = await axios.post(
                \`https://api.notion.com/v1/databases/\${process.env.NOTION_DATABASE_ID}/query\`,
                {},
                {
                  headers: {
                    'Authorization': \`Bearer \${process.env.NOTION_TOKEN}\`,
                    'Notion-Version': '2022-06-28'
                  }
                }
              );
              
              const data = response.data.results.map(page => ({
                title: page.properties.Name?.title?.[0]?.plain_text || '',
                content: page.properties.Content?.rich_text?.[0]?.plain_text || '',
                tags: page.properties.Tags?.multi_select?.map(t => t.name) || [],
                date: page.properties.Date?.date?.start || page.created_time,
                pubDate: page.created_time,
                author: page.properties.Author?.rich_text?.[0]?.plain_text || 'Notion',
                url: page.public_url || ''
              }));
              
              fs.writeFileSync('notion-data.json', JSON.stringify(data, null, 2));
              console.log('✅ Synced ' + data.length + ' items from Notion');
            } catch (error) {
              console.error('❌ Error:', error.message);
              process.exit(1);
            }
          })();
          "

      - name: Commit and push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          if git diff --quiet notion-data.json; then
            echo "No changes to commit"
          else
            git add notion-data.json
            git commit -m "chore: sync notion data $(date '+%Y-%m-%d %H:%M:%S')"
            git push
          fi
