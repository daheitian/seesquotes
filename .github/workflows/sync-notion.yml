name: Sync Notion Data

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install axios

      - name: Fetch Notion data
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        run: |
          node -e "
          const axios = require('axios');
          const fs = require('fs');
          
          (async () => {
            try {
              const url = \`https://api.notion.com/v1/databases/\${process.env.NOTION_DATABASE_ID}/query\`;
              console.log('请求 URL:', url.replace(process.env.NOTION_DATABASE_ID, '***'));
              
              const headers = {
                'Authorization': \`Bearer \${process.env.NOTION_TOKEN}\`,
                'Notion-Version': '2022-06-28'
              };
              
              let allResults = [];
              let hasMore = true;
              let startCursor = undefined;
              let pageCount = 0;
              
              // ✅ 添加排序规则：按 Created 日期字段倒序（最新的在前）
              // 注意：如果属性名不是 'Created'，请改为实际名称，例如 'Date'
              const sortConfig = [
                {
                  property: 'Created',
                  direction: 'descending'
                }
              ];
              
              while (hasMore) {
                pageCount++;
                console.log(\`\\n📌 发起第 \${pageCount} 次请求，cursor: \${startCursor ? startCursor.substring(0,10)+'...' : 'undefined'}\`);
                
                const requestBody = {
                  start_cursor: startCursor,
                  page_size: 100,
                  sorts: sortConfig   // 明确排序
                };
                
                const response = await axios.post(url, requestBody, { headers });
                
                const results = response.data.results;
                allResults.push(...results);
                hasMore = response.data.has_more;
                startCursor = response.data.next_cursor;
                
                console.log(\`📄 本次获取 \${results.length} 条，累计 \${allResults.length} 条\`);
                console.log(\`🔁 has_more: \${hasMore}, next_cursor: \${startCursor ? startCursor.substring(0,10)+'...' : 'null'}\`);
                
                // 可选延时，避免速率限制
                await new Promise(resolve => setTimeout(resolve, 300));
                
                if (hasMore && !startCursor) {
                  console.warn('⚠️ 警告：hasMore 为 true 但未返回 next_cursor，强制终止循环');
                  break;
                }
              }
              
              console.log(\`\\n✅ 总计获取 \${allResults.length} 条记录\`);
              
              // 调试：打印第一条数据的所有属性名和类型
              if (allResults.length > 0) {
                console.log('📋 第一条数据的所有属性名：', Object.keys(allResults[0].properties).join(', '));
                // 打印第一条数据的属性详情（帮助确认字段类型）
                const firstProps = allResults[0].properties;
                Object.keys(firstProps).forEach(key => {
                  console.log(\`  属性 \${key}: type=\${firstProps[key].type}\`);
                });
              }
              
              const data = allResults.map(page => {
                const props = page.properties;
                // 根据你的截图调整映射
                // 标题：可能是 'Name' 或 '标题'
                const title = props.Name?.title?.[0]?.plain_text || props.标题?.title?.[0]?.plain_text || '';
                // 日期：优先 'Created'，其次 'Date'，最后用页面创建时间
                const date = props.Created?.date?.start || props.Date?.date?.start || page.created_time;
                // 作者：'CreatedBy' 可能是 rich_text 或 title 类型
                const author = props.CreatedBy?.rich_text?.[0]?.plain_text || props.CreatedBy?.title?.[0]?.plain_text || 'Notion';
                // 链接：'链接' URL 类型，或回退页面 URL
                const url = props.链接?.url || page.url || '';
                
                return {
                  title,
                  date,
                  author,
                  url,
                  content: props.Content?.rich_text?.[0]?.plain_text || '',
                  tags: props.Tags?.multi_select?.map(t => t.name) || [],
                  pubDate: page.created_time
                };
              });
              
              fs.writeFileSync('notion-data.json', JSON.stringify(data, null, 2));
              console.log(\`💾 已保存 \${data.length} 条数据到 notion-data.json\`);
              
              // 打印前3条和新的一条检查
              console.log('📌 前3条记录：');
              data.slice(0,3).forEach((d,i) => console.log(\`  \${i+1}. \${d.title.substring(0,40)} | \${d.date} | \${d.author}\`));
              console.log('📌 最后一条记录：');
              const last = data[data.length-1];
              console.log(\`  最后: \${last.title.substring(0,40)} | \${last.date} | \${last.author}\`);
              
            } catch (error) {
              console.error('❌ 错误:', error.message);
              if (error.response) {
                console.error('状态码:', error.response.status);
                console.error('详情:', JSON.stringify(error.response.data, null, 2));
              }
              process.exit(1);
            }
          })();
          "
      
      - name: Commit and push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          if git diff --quiet notion-data.json; then
            echo "No changes"
          else
            git add notion-data.json
            git commit -m "sync: $(date '+%Y-%m-%d %H:%M:%S')"
            git push
          fi
