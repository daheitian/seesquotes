name: Sync Notion Data

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Sync Data from Notion
        run: |
          curl -X GET "https://api.notion.com/v1/databases/${{ secrets.NOTION_DATABASE_ID }}/query" \
          -H "Authorization: Bearer ${{ secrets.NOTION_TOKEN }}" \
          -H "Notion-Version: 2021-08-16" \
          -o notion-data.json

      - name: Commit changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add notion-data.json
          git commit -m "Sync Notion data" || echo "No changes to commit" 
          git push
