name: Sync Notion Data

on:
  schedule:
    - cron: '0 */6 * * *'  # 每6小时
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install axios

      - name: Fetch Notion data
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        run: |
          node -e "
          const axios = require('axios');
          const fs = require('fs');
          
          (async () => {
            try {
              const url = \`https://api.notion.com/v1/databases/\${process.env.NOTION_DATABASE_ID}/query\`;
              console.log('请求 URL:', url.replace(process.env.NOTION_DATABASE_ID, '***'));
              
              const headers = {
                'Authorization': \`Bearer \${process.env.NOTION_TOKEN}\`,
                'Notion-Version': '2022-06-28'
              };
              
              let allResults = [];
              let hasMore = true;
              let startCursor = undefined;
              let pageCount = 0;
              
              while (hasMore) {
                pageCount++;
                console.log(\`\\n📌 发起第 \${pageCount} 次请求，cursor: \${startCursor ? startCursor.substring(0,10)+'...' : 'undefined'}\`);
                
                const response = await axios.post(url, {
                  start_cursor: startCursor,
                  page_size: 100
                }, { headers });
                
                const results = response.data.results;
                allResults.push(...results);
                hasMore = response.data.has_more;
                startCursor = response.data.next_cursor;
                
                console.log(\`📄 本次获取 \${results.length} 条，累计 \${allResults.length} 条\`);
                console.log(\`🔁 has_more: \${hasMore}, next_cursor: \${startCursor ? startCursor.substring(0,10)+'...' : 'null'}\`);
                
                if (hasMore && !startCursor) {
                  console.warn('⚠️ 警告：hasMore 为 true 但未返回 next_cursor，强制终止循环');
                  break;
                }
              }
              
              console.log(\`\\n✅ 总计获取 \${allResults.length} 条记录\`);
              
              // 调试：打印第一条数据的所有属性名（帮助你确认实际属性名称）
              if (allResults.length > 0) {
                console.log('📋 第一条数据的所有属性名：', Object.keys(allResults[0].properties).join(', '));
                console.log('🔍 第一条数据属性详情（节选）：', JSON.stringify(allResults[0].properties, null, 2).substring(0, 500));
              }
              
              const data = allResults.map(page => {
                const props = page.properties;
                return {
                  // 根据截图调整的属性映射
                  title: props.Name?.title?.[0]?.plain_text || props.标题?.title?.[0]?.plain_text || '',
                  date: props.Created?.date?.start || page.created_time,
                  author: props.CreatedBy?.rich_text?.[0]?.plain_text || props.CreatedBy?.title?.[0]?.plain_text || 'Notion',
                  url: props.链接?.url || page.url || '',
                  // 保留字段（若无对应属性则为空）
                  content: props.Content?.rich_text?.[0]?.plain_text || '',
                  tags: props.Tags?.multi_select?.map(t => t.name) || [],
                  pubDate: page.created_time
                };
              });
              
              fs.writeFileSync('notion-data.json', JSON.stringify(data, null, 2));
              console.log(\`💾 已保存 \${data.length} 条数据到 notion-data.json\`);
              
              data.slice(0,3).forEach((d,i) => console.log(\`\${i+1}. \${d.title.substring(0,40)} | \${d.date} | \${d.author}\`));
              
            } catch (error) {
              console.error('❌ 错误:', error.message);
              if (error.response) {
                console.error('状态码:', error.response.status);
                console.error('详情:', JSON.stringify(error.response.data, null, 2));
              }
              process.exit(1);
            }
          })();
          "
      
      - name: Commit and push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          if git diff --quiet notion-data.json; then
            echo "No changes"
          else
            git add notion-data.json
            git commit -m "sync: $(date '+%Y-%m-%d %H:%M:%S')"
            git push
          fi
