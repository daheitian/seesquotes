name: Sync Notion Data

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - run: npm install axios
      
      - name: Fetch and sync Notion data
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        run: |
          node -e "
          const axios = require('axios');
          const fs = require('fs');
          
          (async () => {
            const res = await axios.post(
              \`https://api.notion.com/v1/databases/\${process.env.NOTION_DATABASE_ID}/query\`,
              {},
              {
                headers: {
                  'Authorization': \`Bearer \${process.env.NOTION_TOKEN}\`,
                  'Notion-Version': '2022-06-28'
                }
              }
            );
            
            const data = res.data.results.map(p => ({
              title: p.properties.Name?.title?.[0]?.plain_text || '',
              date: p.created_time,
              pubDate: p.created_time,
              author: 'Notion',
              content: '',
              tags: [],
              url: ''
            }));
            
            fs.writeFileSync('notion-data.json', JSON.stringify(data, null, 2));
            console.log('✅ Synced ' + data.length + ' items');
          })();
          "
      
      - name: Commit and push
        run: |
          git config --local user.email 'bot@github.com'
          git config --local user.name 'Notion Sync Bot'
          git add notion-data.json
          git commit -m 'chore: sync notion data' || true
          git push
