name: Sync Notion Data

on:
  schedule:
    - cron: '0 */6 * * *'  # 每6小时
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - run: npm install @notionhq/client
      
      - name: Sync from Notion
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        run: |
          cat > sync.js << 'EOF'
          const { Client } = require('@notionhq/client');
          const fs = require('fs');

          const notion = new Client({ 
            auth: process.env.NOTION_TOKEN,
            notionVersion: '2022-06-28'
          });

          async function sync() {
            try {
              console.log('🔄 连接 Notion...');
              
              // 查询数据库
              const response = await notion.databases.query({
                database_id: process.env.NOTION_DATABASE_ID,
                sorts: [{ timestamp: 'created_time', direction: 'descending' }]
              });

              console.log(`📊 获取到 ${response.results.length} 条记录`);

              if (response.results.length === 0) {
                console.log('⚠️ 数据库为空');
                return;
              }

              // 分析第一条记录的结构（调试用）
              const firstPage = response.results[0];
              console.log('\n📋 第一条记录结构:');
              Object.entries(firstPage.properties).forEach(([key, value]) => {
                console.log(`  - ${key}: ${value.type}`);
              });

              // 解析数据 - 自动识别字段类型
              const posts = response.results.map(page => {
                const props = page.properties;
                
                // 自动找 title 字段（任意名称）
                let title = '无标题';
                for (const [key, value] of Object.entries(props)) {
                  if (value.type === 'title' && value.title?.length > 0) {
                    title = value.title.map(t => t.plain_text).join('');
                    break;
                  }
                }
                
                // 自动找 rich_text 字段作为内容（取最长的那个）
                let content = '';
                let maxLength = 0;
                for (const [key, value] of Object.entries(props)) {
                  if (value.type === 'rich_text' && value.rich_text) {
                    const text = value.rich_text.map(t => t.plain_text).join('');
                    if (text.length > maxLength) {
                      content = text;
                      maxLength = text.length;
                    }
                  }
                }
                
                // 如果没找到 rich_text，尝试 formula 或其他
                if (!content) {
                  for (const [key, value] of Object.entries(props)) {
                    if (value.type === 'formula' && value.formula?.string) {
                      content = value.formula.string;
                      break;
                    }
                  }
                }

                // 提取标签（multi_select）
                let tags = [];
                for (const [key, value] of Object.entries(props)) {
                  if (value.type === 'multi_select' && value.multi_select) {
                    tags = value.multi_select.map(t => t.name);
                    break;
                  }
                }

                return {
                  id: page.id,
                  title: title,
                  content: content,
                  date: page.created_time,
                  pubDate: page.created_time,
                  lastEdited: page.last_edited_time,
                  author: 'Notion',
                  tags: tags,
                  url: page.url
                };
              });

              // 过滤空内容（标题和内容都为空）
              const validPosts = posts.filter(p => p.title !== '无标题' || p.content);
              
              const output = {
                lastSync: new Date().toISOString(),
                source: 'notion',
                databaseId: process.env.NOTION_DATABASE_ID,
                count: validPosts.length,
                posts: validPosts
              };

              fs.writeFileSync('notion-data.json', JSON.stringify(output, null, 2));
              
              console.log(`\n✅ 成功保存 ${validPosts.length} 条记录`);
              console.log('\n📝 前3条预览:');
              validPosts.slice(0, 3).forEach((p, i) => {
                console.log(`  ${i+1}. ${p.title.substring(0, 40)}${p.title.length > 40 ? '...' : ''}`);
                if (p.content) console.log(`     内容: ${p.content.substring(0, 50)}...`);
              });

            } catch (error) {
              console.error('❌ 同步失败:', error.message);
              if (error.code === 'object_not_found') {
                console.error('💡 提示: 数据库ID可能错误，或Integration未授权访问该数据库');
              }
              process.exit(1);
            }
          }

          sync();
          EOF

          node sync.js

      - name: Commit and push
        run: |
          git config user.email 'bot@github.com'
          git config user.name 'Notion Bot'
          
          if git diff --quiet && git diff --staged --quiet; then
            echo "📭 无变化"
            exit 0
          fi
          
          git add notion-data.json
          git commit -m "sync: ${date '+%Y-%m-%d %H:%M:%S'}"
          git push
