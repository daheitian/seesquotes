name: Sync Notion Data

on:
  schedule:
    - cron: '0 */6 * * *'  # 每6小时，更频繁
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install @notionhq/client  # 用官方 SDK 更稳定

      - name: Fetch Notion data
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        run: |
          cat > sync.js << 'EOF'
          const { Client } = require('@notionhq/client');
          const fs = require('fs');

          const notion = new Client({ auth: process.env.NOTION_TOKEN });

          async function sync() {
            try {
              console.log('🔄 开始同步...');
              console.log('Database ID:', process.env.NOTION_DATABASE_ID);

              // ✅ 正确：没有空格，使用 SDK
              const response = await notion.databases.query({
                database_id: process.env.NOTION_DATABASE_ID,
                sorts: [{ timestamp: 'created_time', direction: 'descending' }]
              });

              console.log('📊 获取到', response.results.length, '条记录');

              // 调试：打印第一条的字段结构
              if (response.results.length > 0) {
                console.log('\n第一条的字段:');
                Object.entries(response.results[0].properties).forEach(([k, v]) => {
                  console.log('  -', k, ':', v.type);
                });
              }

              const data = response.results.map(page => {
                const props = page.properties;
                
                // 自动找 title 字段（任意名字）
                let title = '';
                for (const [key, val] of Object.entries(props)) {
                  if (val.type === 'title' && val.title?.length > 0) {
                    title = val.title.map(t => t.plain_text).join('');
                    break;
                  }
                }
                
                // 自动找内容字段（最长的 rich_text）
                let content = '';
                let maxLen = 0;
                for (const [key, val] of Object.entries(props)) {
                  if (val.type === 'rich_text' && val.rich_text) {
                    const text = val.rich_text.map(t => t.plain_text).join('');
                    if (text.length > maxLen) {
                      content = text;
                      maxLen = text.length;
                    }
                  }
                }

                return {
                  title: title || '无标题',
                  content: content,
                  date: page.created_time,
                  pubDate: page.created_time,
                  url: page.url
                };
              });

              fs.writeFileSync('notion-data.json', JSON.stringify({
                lastSync: new Date().toISOString(),
                count: data.length,
                posts: data
              }, null, 2));

              console.log('✅ 同步完成:', data.length, '条');
              console.log('前3条:', data.slice(0,3).map(p => p.title.substring(0,30)));

            } catch (err) {
              console.error('❌ 失败:', err.message);
              if (err.code) console.error('错误码:', err.code);
              process.exit(1);
            }
          }

          sync();
          EOF

          node sync.js

      - name: Commit and push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          if git diff --quiet notion-data.json; then
            echo "No changes"
          else
            git add notion-data.json
            git commit -m "sync: $(date '+%Y-%m-%d %H:%M:%S')"
            git push
          fi
