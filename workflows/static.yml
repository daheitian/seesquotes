name: Sync Notion Data

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:
  push:
    branches: [ main, master ]

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      
      - name: Install jq
        run: sudo apt-get install -y jq
      
      - name: Fetch from Notion
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DB_IDEAS: ${{ secrets.NOTION_DB_IDEAS }}
          NOTION_DB_READING: ${{ secrets.NOTION_DB_READING }}
        run: |
          mkdir -p _data
          
          # Ideas
          if [ -n "$NOTION_TOKEN" ] && [ -n "$NOTION_DB_IDEAS" ]; then
            curl -s -X POST \
              -H "Authorization: Bearer $NOTION_TOKEN" \
              -H "Notion-Version: 2022-06-28" \
              -H "Content-Type: application/json" \
              "https://api.notion.com/v1/databases/$NOTION_DB_IDEAS/query" \
              -d '{"page_size":100}' | jq '.' > _data/notion_ideas.json
          else
            echo '{"results":[]}' > _data/notion_ideas.json
          fi
          
          # Reading
          if [ -n "$NOTION_TOKEN" ] && [ -n "$NOTION_DB_READING" ]; then
            curl -s -X POST \
              -H "Authorization: Bearer $NOTION_TOKEN" \
              -H "Notion-Version: 2022-06-28" \
              -H "Content-Type: application/json" \
              "https://api.notion.com/v1/databases/$NOTION_DB_READING/query" \
              -d '{"page_size":100}' | jq '.' > _data/notion_reading.json
          else
            echo '{"results":[]}' > _data/notion_reading.json
          fi
      
      - name: Commit
        run: |
          git add _data/
          git diff --cached --quiet || (git commit -m "🔄 Sync Notion data" && git push)
