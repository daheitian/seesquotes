name: Sync Notion and Deploy

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:
  push:
    branches: [ main ]

# 关键权限设置
permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  sync-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      # 1. 检出代码（使用 GITHUB_TOKEN 获得写权限）
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
      
      # 2. 配置 Git（关键：设置 safe.directory）
      - name: Setup Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global --add safe.directory /github/workspace
      
      # 3. 安装 jq 处理 JSON
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq
      
      # 4. 从 Notion 获取数据
      - name: Fetch Notion Data
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DB_IDEAS: ${{ secrets.NOTION_DB_IDEAS }}
          NOTION_DB_READING: ${{ secrets.NOTION_DB_READING }}
        run: |
          mkdir -p _data
          
          # 获取 Ideas（见室引号）
          if [ -n "$NOTION_TOKEN" ] && [ -n "$NOTION_DB_IDEAS" ]; then
            echo "📝 Fetching ideas..."
            curl -s -X POST \
              -H "Authorization: Bearer $NOTION_TOKEN" \
              -H "Notion-Version: 2022-06-28" \
              -H "Content-Type: application/json" \
              "https://api.notion.com/v1/databases/$NOTION_DB_IDEAS/query" \
              -d '{"sorts":[{"timestamp":"created_time","direction":"descending"}],"page_size":100}' \
              | jq '.' > _data/notion_ideas.json
            
            echo "✅ Ideas: $(jq '.results | length' _data/notion_ideas.json) items"
          else
            echo '{"results":[]}' > _data/notion_ideas.json
            echo "⚠️ NOTION_TOKEN or NOTION_DB_IDEAS not set"
          fi
          
          # 获取 Reading（阅览）
          if [ -n "$NOTION_TOKEN" ] && [ -n "$NOTION_DB_READING" ]; then
            echo "📚 Fetching reading list..."
            curl -s -X POST \
              -H "Authorization: Bearer $NOTION_TOKEN" \
              -H "Notion-Version: 2022-06-28" \
              -H "Content-Type: application/json" \
              "https://api.notion.com/v1/databases/$NOTION_DB_READING/query" \
              -d '{"sorts":[{"timestamp":"created_time","direction":"descending"}],"page_size":100}' \
              | jq '.' > _data/notion_reading.json
            
            echo "✅ Reading: $(jq '.results | length' _data/notion_reading.json) items"
          else
            echo '{"results":[]}' > _data/notion_reading.json
            echo "⚠️ NOTION_DB_READING not set"
          fi
          
          # 验证文件
          ls -la _data/
      
      # 5. 提交数据文件（解决 128 错误的关键）
      - name: Commit Data Files
        run: |
          git add _data/
          
          if git diff --cached --quiet; then
            echo "ℹ️ No changes to commit"
          else
            git commit -m "🔄 Auto-sync Notion data [$(date +'%Y-%m-%d %H:%M UTC')]"
            
            # 使用 GITHUB_TOKEN 推送（关键修复）
            git remote set-url origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
            git push origin HEAD:${{ github.ref_name }}
            
            echo "✅ Data committed and pushed"
          fi
      
      # 6. 准备静态站点
      - name: Prepare Site
        run: |
          mkdir -p _site
          
          # 复制所有静态文件到 _site
          cp -r *.html _site/ 2>/dev/null || true
          cp -r _layouts _site/ 2>/dev/null || true
          cp -r assets _site/ 2>/dev/null || true
          cp -r _data _site/ 2>/dev/null || true
          cp -r posts _site/ 2>/dev/null || true
          cp -r scripts _site/ 2>/dev/null || true
          
          # 确保数据文件存在
          mkdir -p _site/_data
          [ -f "_data/notion_ideas.json" ] && cp _data/notion_ideas.json _site/_data/
          [ -f "_data/notion_reading.json" ] && cp _data/notion_reading.json _site/_data/
          
          echo "📁 Site structure:"
          find _site -type f | head -20
      
      # 7. 部署到 GitHub Pages
      - name: Setup Pages
        uses: actions/configure-pages@v4
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'
      
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
