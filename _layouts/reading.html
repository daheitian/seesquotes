---
layout: default
title: 阅览
---

<div class="page-header">
  <div class="hero-icon">📚</div>
  <h1>阅览</h1>
  <p>阅读过的优质文章与资源</p>
</div>

<div class="stats" style="margin-bottom: 24px;">
  <div class="stat-item">
    <div class="stat-value" id="readCount">-</div>
    <div class="stat-label">已读</div>
  </div>
  <div class="stat-item">
    <div class="stat-value" id="readingCount">-</div>
    <div class="stat-label">在读</div>
  </div>
  <div class="stat-item">
    <div class="stat-value" id="wantCount">-</div>
    <div class="stat-label">想读</div>
  </div>
</div>

<div class="search-box">
  <input type="text" id="readingSearch" placeholder="搜索阅读记录..." autocomplete="off">
</div>

<div class="filter-tabs" style="display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap;">
  <button class="filter-btn active" data-filter="all">全部</button>
  <button class="filter-btn" data-filter="已读">已读</button>
  <button class="filter-btn" data-filter="在读">在读</button>
  <button class="filter-btn" data-filter="想读">想读</button>
  <button class="filter-btn" data-filter="abandoned"> abandoned</button>
</div>

<div class="posts" id="readingList">
  <div class="loading">
    <div class="loading-spinner"></div>
    <p>正在加载...</p>
  </div>
</div>

<script>
// ============================================
// 阅览 - 读取本地 JSON 数据
// ============================================

let readings = [];
let currentFilter = 'all';

function formatTime(d) {
  if (!d) return '';
  return new Date(d).toLocaleDateString('zh-CN', { month: 'short', day: 'numeric' });
}

// 解析阅读数据
function parseReadingData(data) {
  if (!data || !data.results) return [];
  
  return data.results.map(page => {
    const props = page.properties;
    
    return {
      id: page.id,
      title: props.Name?.title?.[0]?.plain_text || 
             props.标题?.title?.[0]?.plain_text || 
             '无标题',
      url: props.URL?.url || 
           props.Link?.url || 
           props.链接?.url || 
           '#',
      author: props.Author?.rich_text?.[0]?.plain_text || 
              props.作者?.rich_text?.[0]?.plain_text || 
              '',
      site: props.Site?.rich_text?.[0]?.plain_text || 
            props.Source?.rich_text?.[0]?.plain_text || 
            props.来源?.rich_text?.[0]?.plain_text || 
            '',
      status: props.Status?.select?.name || 
              props.状态?.select?.name || 
              '未分类',
      tags: props.Tags?.multi_select?.map(t => t.name) || 
            props.标签?.multi_select?.map(t => t.name) || [],
      notes: props.Notes?.rich_text?.[0]?.plain_text || 
             props.笔记?.rich_text?.[0]?.plain_text || 
             '',
      favorite: props.Favorite?.checkbox || 
                props.收藏?.checkbox || 
                false,
      created_time: page.created_time,
      cover: page.cover?.external?.url || page.cover?.file?.url || null
    };
  });
}

function renderReadingList(items) {
  const c = document.getElementById('readingList');
  if (!items || !items.length) {
    c.innerHTML = `
      <div class="empty">
        <div class="empty-icon">📖</div>
        <p>暂无阅读记录</p>
        <p style="font-size: 13px; margin-top: 8px; color: var(--text-muted);">
          在 Notion 阅读数据库中添加内容
        </p>
      </div>`;
    return;
  }
  
  c.innerHTML = items.map(item => {
    const statusColors = {
      '已读': '#00ba7c',
      '在读': '#1d9bf0',
      '想读': '#f59e0b',
      'abandoned': '#f4212e'
    };
    const statusColor = statusColors[item.status] || '#8899a6';
    
    // 如果 URL 无效，不显示链接样式
    const hasValidUrl = item.url && item.url !== '#';
    
    return `
      <div class="blog-item reading-item" style="position: relative; overflow: hidden;">
        <div style="position: absolute; left: 0; top: 0; bottom: 0; width: 4px; background: ${statusColor};"></div>
        ${hasValidUrl ? `<a href="${item.url}" target="_blank" style="text-decoration: none; color: inherit; display: block;">` : '<div>'}
          <div class="blog-item-title" style="display: flex; align-items: center; gap: 8px; padding-left: 12px;">
            ${item.favorite ? '<span style="color: #f59e0b;">⭐</span>' : ''}
            ${item.title}
            ${hasValidUrl ? '<span style="color: var(--text-muted); font-size: 14px;">↗</span>' : ''}
          </div>
          <div class="blog-item-meta" style="padding-left: 12px;">
            ${item.author ? `作者: ${item.author} · ` : ''}
            ${item.site ? `来源: ${item.site} · ` : ''}
            ${formatTime(item.created_time)}
          </div>
          ${item.notes ? `<div class="blog-item-excerpt" style="margin-top: 8px; padding-left: 12px; border-left: 2px solid var(--border);">💡 ${item.notes}</div>` : ''}
        ${hasValidUrl ? '</a>' : '</div>'}
        <div class="blog-item-tags" style="margin-top: 12px; padding-left: 12px;">
          <span class="blog-item-tag" style="background: ${statusColor}20; color: ${statusColor};">${item.status}</span>
          ${item.tags?.map(t => `<span class="blog-item-tag">${t}</span>`).join('') || ''}
        </div>
      </div>
    `;
  }).join('');
}

async function loadReadings() {
  const c = document.getElementById('readingList');
  c.innerHTML = `<div class="loading"><div class="loading-spinner"></div><p>正在加载...</p></div>`;
  
  try {
    const response = await fetch('{{ site.baseurl }}/_data/notion_reading.json?t=' + Date.now());
    
    if (!response.ok) {
      throw new Error('数据文件不存在');
    }
    
    const data = await response.json();
    readings = parseReadingData(data);
    
    // 更新统计
    const read = readings.filter(r => r.status === '已读').length;
    const reading = readings.filter(r => r.status === '在读').length;
    const want = readings.filter(r => r.status === '想读').length;
    
    document.getElementById('readCount').textContent = read;
    document.getElementById('readingCount').textContent = reading;
    document.getElementById('wantCount').textContent = want;
    
    applyFilter();
    
  } catch (error) {
    c.innerHTML = `
      <div class="error">
        <div class="error-icon">⏳</div>
        <h3>等待数据同步</h3>
        <p>正在从 Notion 同步阅读数据...</p>
      </div>`;
  }
}

function applyFilter() {
  let filtered = readings;
  if (currentFilter !== 'all') {
    filtered = readings.filter(r => r.status === currentFilter);
  }
  
  // 同时应用搜索
  const searchQuery = document.getElementById('readingSearch').value.toLowerCase();
  if (searchQuery) {
    filtered = filtered.filter(r => 
      r.title.toLowerCase().includes(searchQuery) ||
      r.author?.toLowerCase().includes(searchQuery) ||
      r.notes?.toLowerCase().includes(searchQuery) ||
      r.tags?.some(t => t.toLowerCase().includes(searchQuery))
    );
  }
  
  renderReadingList(filtered);
}

// 筛选按钮
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    applyFilter();
  });
});

// 搜索
document.getElementById('readingSearch').addEventListener('input', applyFilter);

loadReadings();
</script>
