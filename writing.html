<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>写作 | 小信号</title>
  <meta name="description" content="写作练习与文章">
  
  <style>
    :root {
      --bg-primary: #0d0d0d;
      --bg-secondary: #141414;
      --bg-card: #1a1a1a;
      --bg-card-hover: #222222;
      --text-primary: #e7e9ea;
      --text-secondary: #8899a6;
      --text-muted: #536471;
      --accent: #1d9bf0;
      --border: #2f3336;
      --shadow: rgba(0, 0, 0, 0.5);
      --radius: 16px;
    }
    
    [data-theme="light"] {
      --bg-primary: #f5f5f5;
      --bg-secondary: #ffffff;
      --bg-card: #ffffff;
      --bg-card-hover: #f7f9fa;
      --text-primary: #0f1419;
      --text-secondary: #536471;
      --text-muted: #8899a6;
      --accent: #1d9bf0;
      --border: #e1e8ed;
      --shadow: rgba(0, 0, 0, 0.08);
    }
    
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
    }
    
    header {
      position: sticky;
      top: 0;
      background: rgba(13, 13, 13, 0.95);
      backdrop-filter: blur(20px);
      z-index: 100;
      padding: 16px 0;
      border-bottom: 1px solid var(--border);
    }
    
    [data-theme="light"] header {
      background: rgba(255, 255, 255, 0.95);
    }
    
    .header-inner {
      max-width: 720px;
      margin: 0 auto;
      padding: 0 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    
    .logo {
      font-size: 18px;
      font-weight: 700;
      color: var(--text-primary);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .logo span { color: var(--accent); }
    
    nav {
      display: flex;
      align-items: center;
      gap: 4px;
      background: var(--bg-card);
      padding: 6px;
      border-radius: 100px;
      border: 1px solid var(--border);
    }
    
    nav a {
      padding: 8px 16px;
      border-radius: 100px;
      font-size: 14px;
      font-weight: 500;
      color: var(--text-secondary);
      text-decoration: none;
      transition: all 0.2s ease;
      white-space: nowrap;
    }
    
    nav a:hover, nav a.active {
      color: var(--text-primary);
      background: var(--bg-card-hover);
    }
    
    .controls {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .btn-icon {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--bg-card);
      color: var(--text-secondary);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
    }
    
    .btn-icon:hover {
      background: var(--bg-card-hover);
      color: var(--text-primary);
    }
    
    main {
      max-width: 720px;
      margin: 0 auto;
      padding: 40px 20px;
    }
    
    .page-header {
      text-align: center;
      padding: 40px 0 32px;
    }
    
    .hero-icon { font-size: 48px; margin-bottom: 16px; }
    
    .page-header h1 {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 12px;
      color: var(--text-primary);
      letter-spacing: 2px;
    }
    
    .page-header p {
      font-size: 15px;
      color: var(--text-secondary);
      max-width: 400px;
      margin: 0 auto;
      line-height: 1.7;
    }
    
    .posts {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    
    .post {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      transition: all 0.2s ease;
      text-decoration: none;
      color: inherit;
      display: block;
    }
    
    .post:hover {
      background: var(--bg-card-hover);
      transform: translateY(-2px);
      box-shadow: 0 8px 32px var(--shadow);
    }
    
    .post h2 {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 8px;
      color: var(--text-primary);
    }
    
    .post-meta {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 12px;
    }
    
    .post-excerpt {
      font-size: 15px;
      color: var(--text-secondary);
      line-height: 1.6;
    }
    
    .post-tags {
      margin-top: 12px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    
    .tag {
      padding: 4px 10px;
      background: rgba(29, 155, 240, 0.1);
      color: var(--accent);
      font-size: 12px;
      border-radius: 100px;
    }
    
    footer {
      text-align: center;
      padding: 40px 20px;
      border-top: 1px solid var(--border);
      margin-top: 40px;
    }
    
    footer p {
      font-size: 13px;
      color: var(--text-muted);
    }
    
    .menu-btn {
      display: none;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--bg-card);
      color: var(--text-secondary);
      cursor: pointer;
      align-items: center;
      justify-content: center;
    }
    
    .mobile-nav {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.95);
      z-index: 999;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
    }
    
    .mobile-nav.active { display: flex; }
    
    .mobile-nav a {
      font-size: 24px;
      color: white;
      text-decoration: none;
      padding: 12px 24px;
    }
    
    .mobile-nav-close {
      position: absolute;
      top: 20px;
      right: 20px;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: none;
      background: rgba(255, 255, 255, 0.1);
      color: white;
      font-size: 24px;
      cursor: pointer;
    }
    
    @media (max-width: 640px) {
      nav { display: none; }
      .menu-btn { display: flex; }
      .page-header { padding: 32px 0 24px; }
      .page-header h1 { font-size: 22px; }
      .post { padding: 20px; }
    }
  </style>
</head>
<body>
  <header>
    <div class="header-inner">
      <a href="./" class="logo">小信号<span>.</span></a>
      <nav>
        <a href="./">见室引号</a>
        <a href="./writing.html" class="active">写作</a>
        <a href="./reading.html">阅览</a>
        <a href="./about.html">关于</a>
      </nav>
      <div class="controls">
        <button class="btn-icon" id="themeBtn" title="切换主题">
          <svg id="sunIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="5"/>
            <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
          </svg>
          <svg id="moonIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none">
            <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>
          </svg>
        </button>
        <button class="menu-btn" id="menuBtn">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 12h18M3 6h18M3 18h18"/>
          </svg>
        </button>
      </div>
    </div>
  </header>

  <div class="mobile-nav" id="mobileNav">
    <button class="mobile-nav-close" id="mobileNavClose">&times;</button>
    <a href="./">见室引号</a>
    <a href="./writing.html">写作</a>
    <a href="./reading.html">阅览</a>
    <a href="./about.html">关于</a>
  </div>

  <main>
    <div class="page-header">
      <div class="hero-icon">✍️</div>
      <h1>WRITING</h1>
      <p>练习写作，记录思考</p>
    </div>

    <div class="posts" id="postsContainer">
      <!-- 文章列表将由 JavaScript 动态加载 -->
      <div class="post">
        <h2>示例文章标题</h2>
        <div class="post-meta">2024年3月2日 · 5分钟阅读</div>
        <div class="post-excerpt">这是一篇示例文章的摘要，展示写作页面的样式。实际文章将从本地或 Notion 加载...</div>
        <div class="post-tags">
          <span class="tag">写作</span>
          <span class="tag">思考</span>
        </div>
      </div>
    </div>
  </main>

  <footer>
    <p>© 2024 小信号 · 由 Notion 驱动</p>
  </footer>

  <script>
    // 主题切换
    function initTheme() {
      const savedTheme = localStorage.getItem('theme') || 'dark';
      document.documentElement.setAttribute('data-theme', savedTheme);
      updateThemeIcon(savedTheme);
    }

    function toggleTheme() {
      const current = document.documentElement.getAttribute('data-theme');
      const next = current === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
      updateThemeIcon(next);
    }

    function updateThemeIcon(theme) {
      const sun = document.getElementById('sunIcon');
      const moon = document.getElementById('moonIcon');
      sun.style.display = theme === 'dark' ? 'block' : 'none';
      moon.style.display = theme === 'dark' ? 'none' : 'block';
    }

    // 移动端菜单
    function initMobileMenu() {
      const menuBtn = document.getElementById('menuBtn');
      const mobileNav = document.getElementById('mobileNav');
      const closeBtn = document.getElementById('mobileNavClose');
      
      menuBtn.addEventListener('click', () => mobileNav.classList.add('active'));
      closeBtn.addEventListener('click', () => mobileNav.classList.remove('active'));
      mobileNav.querySelectorAll('a').forEach(link => {
        link.addEventListener('click', () => mobileNav.classList.remove('active'));
      });
    }

    // 初始化
    document.addEventListener('DOMContentLoaded', () => {
      initTheme();
      initMobileMenu();
      document.getElementById('themeBtn').addEventListener('click', toggleTheme);
    });
  </script>
</body>
</html>
